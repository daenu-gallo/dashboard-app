# ── Conditional HSTS: only for *.fotohahn.ch domains ──
# Tailscale (debian.orca-mirfak.ts.net) has no SSL, so HSTS would break it
map $host $hsts_header {
    ~*\.fotohahn\.ch  "max-age=31536000; includeSubDomains";
    default           "";
}

# ── Extract gallery slug from URI for PWA manifest injection ──
# Maps the request URI to a gallery slug (e.g. /hochzeit-claudia-martin → hochzeit-claudia-martin)
# Uses $request_uri (not $uri) because try_files rewrites $uri to /index.html
# This is used by sub_filter to inject the correct manifest link into the HTML
# so that iOS Safari's "Add to Home Screen" preserves the gallery URL.
map $request_uri $gallery_slug {
    ~^/([a-z0-9][a-z0-9_-]+)(\?.*)?$  $1;
    default                             "";
}

# Build the manifest URL based on the gallery slug (with absolute origin like Scrappbook)
map $gallery_slug $manifest_link {
    ""       "";
    default  '<link rel="manifest" href="https://api.fotohahn.ch/api/manifest?origin=https://$host&start=/$gallery_slug">';
}

# Build apple-mobile-web-app-capable meta tag (only for gallery pages)
map $gallery_slug $apple_webapp_meta {
    ""       "";
    default  '<meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">';
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Note: HTTPS redirect is handled by Cloudflare "Always Use HTTPS"
    # Do NOT add a redirect here — Cloudflare Tunnel communicates over HTTP internally

    # ── Security Headers ──
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security $hsts_header always;

    # ── Content-Security-Policy ──
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://static.cloudflareinsights.com https://js.stripe.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https: ; connect-src 'self' https://fotohahn.ch https://*.fotohahn.ch wss://*.fotohahn.ch https://static.cloudflareinsights.com https://api.stripe.com; manifest-src 'self' https://*.fotohahn.ch; frame-src https://www.youtube.com https://youtube.com https://player.vimeo.com https://vimeo.com https://js.stripe.com; frame-ancestors 'self'; base-uri 'self'; form-action 'self' https://checkout.stripe.com;" always;

    # ── SPA: all routes go to index.html ──
    # sub_filter injects the gallery-specific manifest link into the HTML
    # so iOS Safari sees it in the INITIAL HTML response (not via JavaScript).
    location / {
        try_files $uri $uri/ /index.html;

        # Inject manifest and apple-mobile-web-app meta tags into HTML
        sub_filter '<!-- manifest is injected dynamically by useDynamicManifest (per-gallery start_url) -->' '$manifest_link$apple_webapp_meta';
        sub_filter_once on;
        sub_filter_types text/html;
    }

    # ── Cache static assets ──
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Strict-Transport-Security $hsts_header always;
    }

    # ── Gzip compression ──
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 256;
}

