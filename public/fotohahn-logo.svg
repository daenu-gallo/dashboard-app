<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Outer circle -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="#2a2a2a" stroke-width="3"/>
  <!-- Geometric web pattern -->
  <circle cx="100" cy="100" r="85" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>
  <circle cx="100" cy="100" r="75" fill="none" stroke="#2a2a2a" stroke-width="1"/>
  <!-- Cross lines for web effect -->
  <line x1="100" y1="5" x2="100" y2="195" stroke="#2a2a2a" stroke-width="1" opacity="0.3"/>
  <line x1="5" y1="100" x2="195" y2="100" stroke="#2a2a2a" stroke-width="1" opacity="0.3"/>
  <line x1="30" y1="30" x2="170" y2="170" stroke="#2a2a2a" stroke-width="1" opacity="0.3"/>
  <line x1="170" y1="30" x2="30" y2="170" stroke="#2a2a2a" stroke-width="1" opacity="0.3"/>
  <line x1="100" y1="5" x2="30" y2="170" stroke="#2a2a2a" stroke-width="0.8" opacity="0.25"/>
  <line x1="100" y1="5" x2="170" y2="170" stroke="#2a2a2a" stroke-width="0.8" opacity="0.25"/>
  <line x1="5" y1="100" x2="170" y2="30" stroke="#2a2a2a" stroke-width="0.8" opacity="0.25"/>
  <line x1="5" y1="100" x2="170" y2="170" stroke="#2a2a2a" stroke-width="0.8" opacity="0.25"/>
  <line x1="195" y1="100" x2="30" y2="30" stroke="#2a2a2a" stroke-width="0.8" opacity="0.25"/>
  <line x1="195" y1="100" x2="30" y2="170" stroke="#2a2a2a" stroke-width="0.8" opacity="0.25"/>
  <line x1="100" y1="195" x2="30" y2="30" stroke="#2a2a2a" stroke-width="0.8" opacity="0.25"/>
  <line x1="100" y1="195" x2="170" y2="30" stroke="#2a2a2a" stroke-width="0.8" opacity="0.25"/>
  <!-- Inner circle background -->
  <circle cx="100" cy="100" r="65" fill="white"/>
  <!-- Rooster silhouette -->
  <g transform="translate(100,105) scale(0.55)" fill="#2a2a2a">
    <!-- Body -->
    <ellipse cx="0" cy="10" rx="38" ry="28"/>
    <!-- Neck -->
    <path d="M 15,-10 Q 25,-35 20,-55 Q 18,-60 12,-55 Q 5,-45 8,-20 Z"/>
    <!-- Head -->
    <circle cx="22" cy="-58" r="10"/>
    <!-- Beak -->
    <path d="M 32,-58 L 42,-55 L 32,-53 Z"/>
    <!-- Comb -->
    <path d="M 18,-68 Q 22,-78 20,-68 Q 24,-76 22,-66 Q 26,-72 24,-64" fill="#2a2a2a"/>
    <!-- Wattle -->
    <path d="M 25,-50 Q 30,-46 27,-42" fill="#2a2a2a" stroke="#2a2a2a" stroke-width="2"/>
    <!-- Tail feathers -->
    <path d="M -30,-5 Q -55,-30 -50,-50 Q -45,-35 -35,-20 Q -50,-40 -45,-55 Q -40,-38 -30,-18 Q -45,-35 -42,-52 Q -35,-30 -25,-15 Z"/>
    <!-- Legs -->
    <line x1="-5" y1="35" x2="-10" y2="60" stroke="#2a2a2a" stroke-width="3"/>
    <line x1="10" y1="35" x2="8" y2="60" stroke="#2a2a2a" stroke-width="3"/>
    <!-- Feet -->
    <path d="M -18,60 L -10,60 L -5,55 L -10,60 L -3,63" fill="none" stroke="#2a2a2a" stroke-width="2"/>
    <path d="M 0,60 L 8,60 L 13,55 L 8,60 L 15,63" fill="none" stroke="#2a2a2a" stroke-width="2"/>
  </g>
</svg>
